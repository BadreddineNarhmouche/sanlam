<!DOCTYPE html>
<html>
<head>
    <style>
        .headerClass {
            margin-top: 10px;
            margin-bottom: 10px;
            padding: 5px;
        }

        .dateDocument {
            margin-left: 380px;
            position: absolute;
            font-size: 18.5px;
            font-style: normal;
        }
    </style>
    <script charset="utf-8">
        function replaceParams() {
            var url = window.location.href
                .replace(/#$/, "");
            var params = (url.split("?")[1] || "").split("&");

            for (var i = 0; i < params.length; i++) {
                var param = params[i].split("=");
                var key = param[0];
                var value = param[1] || '';

                switch (key) {
                    case "showDate":
                        if (value !== "") {
                            var regex = new RegExp('{date}', 'g');
                            document.getElementById('documentDate').innerHTML = '<p> Casablanca, le {date} </p>'.replace(regex, value);
                        }
                        break;
                    case "useHeader":
                        if (value === "False") {
                            document.getElementById('headerImg').innerHTML = '';
                        }
                        break;

                    default:
                        break;
                }
            }
        }
    </script>
</head>
