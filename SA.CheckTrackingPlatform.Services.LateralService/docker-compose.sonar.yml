version: "3.9"

services:
  sonar-db:  #service BDD -> stockage issues , métriques , historiques 
    image: postgres:13
    container_name: sonar_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_data:/var/lib/postgresql/data

  sonarqube:  #service sonar 
    image: sonarqube:community
    container_name: sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar #
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    depends_on:
      - sonar-db # démarrage sonar-db puis sonarqube

volumes:
  sonar_data:
